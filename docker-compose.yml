# Anaqah Store - Docker Compose Configuration
# متجر أناقة - إعدادات Docker Compose

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: anaqah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anaqah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anaqah_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-anaqah_store}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anaqah}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anaqah-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-anaqah}:${POSTGRES_PASSWORD:-anaqah_secret_2024}@db:5432/${POSTGRES_DB:-anaqah_store}
      SESSION_SECRET: ${SESSION_SECRET:-your-super-secret-session-key-change-in-production}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/api/settings"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: anaqah-network
